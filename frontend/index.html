<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clínica Saúde Plena — Agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Clínica Saúde Plena</h1>
  <h2>Agendar consulta</h2>

  <label for="especialidade">Especialidade:</label>
  <select id="especialidade">
    <option value="">Selecione...</option>
  </select>
  <label for="profissional">Profissional:</label>
<select id="profissional" disabled>
  <option value="">Selecione uma especialidade primeiro</option>
</select>
<label for="horario">Horário:</label>
<select id="horario" disabled>
  <option value="">Selecione um profissional primeiro</option>
</select>
<label for="nome">Nome completo:</label>
<input type="text" id="nome" placeholder="Seu nome completo">

<label for="cpf">CPF:</label>
<input type="text" id="cpf" placeholder="Somente números" maxlength="11">

<button id="btnAgendar">Confirmar agendamento</button>

<p id="mensagem"></p>

<hr>

<h2>Consultar/cancelar agendamento</h2>

<label for="cpfConsulta">CPF:</label>
<input type="text" id="cpfConsulta" placeholder="Somente números" maxlength="11">

<button id="btnBuscar">Buscar</button>

<p id="mensagemConsulta"></p>

<ul id="listaAgendamentos"></ul>

  <script src="script.js"></script>
</body>
</html>
